    <path d="M7 40H27V34H13V8H7V40Z" fill="url(#lupin-growth)"/>
    <path d="M27 34L41 20" stroke="#3DAA72" stroke-width="3.25" stroke-linecap="round"/>
    <path d="M35 20H41V26" stroke="#3DAA72" stroke-width="3.25" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Lupin stem petals -->
    <path d="M15.5 31L19 27.5L22.5 31L19 34.5L15.5 31Z" fill="url(#lupin-petal)" fill-opacity="0.9"/>
    <path d="M15.5 25.5L19 22L22.5 25.5L19 29L15.5 25.5Z" fill="url(#lupin-petal)" fill-opacity="0.94"/>
    <path d="M15.5 20L19 16.5L22.5 20L19 23.5L15.5 20Z" fill="url(#lupin-petal)"/>
    <path d="M15.5 14.5L19 11L22.5 14.5L19 18L15.5 14.5Z" fill="url(#lupin-petal)" fill-opacity="0.92"/>
    <path d="M15.5 9L19 5.5L22.5 9L19 12.5L15.5 9Z" fill="url(#lupin-petal)" fill-opacity="0.82"/>
  </g>
