<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lupin Leads" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="lupin-petal" x1="18" y1="6" x2="18" y2="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B794F6"/>
      <stop offset="0.45" stop-color="#8B6CF8"/>
      <stop offset="1" stop-color="#5B3FE0"/>
    </linearGradient>
    <linearGradient id="lupin-growth" x1="8" y1="40" x2="44" y2="14" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A5C3E"/>
      <stop offset="0.55" stop-color="#2A7A52"/>
      <stop offset="1" stop-color="#3DAA72"/>
    </linearGradient>
    <filter id="lupin-glow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.4"/>
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#52B788" flood-opacity="0.38"/>
    </filter>
  </defs>
  <g filter="url(#lupin-glow)">
